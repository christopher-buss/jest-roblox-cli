name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install
        run: nci

      - name: Build
        run: nr build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

        run: pnpm publish --access public --no-git-checks
      - name: Generate changelog
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: pnpx changelogithub
      - name: Upload plugin to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" plugin/JestRobloxRunner.rbxm --clobber

  build-sea:
    needs: release
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, binary: jest-roblox-linux-x64 }
          - { os: macos-latest, binary: jest-roblox-darwin-arm64 }
          - { os: windows-latest, binary: jest-roblox-windows-x64.exe }

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install
        run: nci

      - name: Build
        run: nr build

      - name: Rename binary
        shell: bash
        run: |
          src="dist/sea/jest-roblox"
          if [[ "${{ matrix.binary }}" == *.exe ]]; then src="${src}.exe"; fi
          mv "$src" "dist/sea/${{ matrix.binary }}"

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "dist/sea/${{ matrix.binary }}" --clobber
